syntax = "proto3";

package pbws;

message WebSocketRequest {
  string token = 1;
  string appkey = 2;
  string namespace = 3;
  string version = 4;
  string event = 5;
  optional string payload = 6;
  bytes data = 7;
  string task_id = 8;
  optional uint64 seq_id = 9;
}

message WebSocketResponse {
  string task_id = 1;
  string message_id = 2;
  string namespace = 3;
  string event = 4;
  int32 status_code = 5;
  string status_text = 6;
  optional string payload = 7;
  bytes data = 8;
  optional uint64 seq_id = 9;
}
